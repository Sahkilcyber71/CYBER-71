<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-71 App Store</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* 3D Animation Style */
        .profile-container { perspective: 1000px; margin: 30px auto; width: 150px; height: 150px; }
        .profile-box { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: rotate3d 10s infinite linear; }
        .profile-box img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #38bdf8; position: absolute; backface-visibility: hidden; object-fit: cover; }
        @keyframes rotate3d { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #38bdf8; font-size: 2.5em; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .app-card { background: #1e293b; padding: 15px; border-radius: 20px; border: 1px solid #334155; transition: 0.3s; text-align: center; }
        .app-card:hover { transform: translateY(-10px); border-color: #38bdf8; }
        .app-card img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 10px; }
        .app-card h3 { font-size: 14px; margin: 10px 0; height: 35px; overflow: hidden; }
        .btn { display: inline-block; padding: 8px 15px; background: #38bdf8; color: #0f172a; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="profile-container">
            <div class="profile-box">
                <img src="logos/shakil.jpg" alt="Profile">
            </div>
        </div>
        <h1>CYBER-71</h1>
        <p>Premium Android Tools</p>
    </div>

    <div class="app-grid">
        <div class="app-card">
            <img src="logos/Andro_Dumpper.png" alt="Icon">
            <h3>Andro Dumpper</h3>
            <a href="Apps/Andro Dumpper.apk" class="btn">Download</a>
        </div>

        <div class="app-card">
            <img src="logos/AirMon_v1.8.png" alt="Icon">
            <h3>AirMon v1.8</h3>
            <a href="Apps/AirMon_v1.8.apk" class="btn">Download</a>
        </div>

        <div class="app-card">
            <img src="logos/Claves Wifi.png" alt="Icon">
            <h3>Claves Wifi</h3>
            <a href="Apps/Claves Wifi.apk" class="btn">Download</a>
        </div>
        
        </div>

</body>
</html>
